<script type="module">
import * as THREE from 'three';
import { buildScene, addPanel, WAYPOINTS } from './scene.js';
import { initNexus } from './nexus.js';

const isMobile = window.innerWidth < 768;
const mobileView = document.getElementById('mobile-view');

const bgCanvas = document.getElementById('bg-canvas');
const css3dHost = document.getElementById('css3d');

// ----- spawn panels -----
const panelEls = {};
let scene, camera, renderer, cssRenderer, props, points, glow;

if (!isMobile) {
  ({ scene, camera, renderer, cssRenderer, props, points, glow } = buildScene(bgCanvas, css3dHost));
  WAYPOINTS.forEach(wp => {
    const tpl = document.getElementById('t-' + wp.id);
    const el = tpl.content.firstElementChild.cloneNode(true);
    panelEls[wp.id] = el;
    addPanel(scene, el, wp.panel.pos, wp.panel.rot, 1);
  });
  initNexus(panelEls.nexus);
} else {
  // dismiss boot on mobile
  setTimeout(() => {
    const b = document.getElementById('boot');
    if (b) { b.classList.add('gone'); setTimeout(() => b.remove(), 700); }
  }, 600);
  // flat mobile layout
  WAYPOINTS.forEach(wp => {
    const tpl = document.getElementById('t-' + wp.id);
    const el = tpl.content.firstElementChild.cloneNode(true);
    el.id = 'section-' + wp.id;
    mobileView.appendChild(el);
  });
  initNexus(mobileView.querySelector('.nexus'));

  // ---- mobile particle background ----
  const mbc = document.getElementById('mobile-bg');
  const ctx2 = mbc.getContext('2d');
  function resizeMbc() { mbc.width = window.innerWidth; mbc.height = window.innerHeight; }
  resizeMbc();
  window.addEventListener('resize', resizeMbc);
  const dots = Array.from({ length: 90 }, () => ({
    x: Math.random() * window.innerWidth,
    y: Math.random() * window.innerHeight,
    r: Math.random() * 1.2 + 0.2,
    vx: (Math.random() - 0.5) * 0.25,
    vy: (Math.random() - 0.5) * 0.25,
    acid: Math.random() < 0.12,
  }));
  (function drawMobileBg() {
    ctx2.fillStyle = '#000';
    ctx2.fillRect(0, 0, mbc.width, mbc.height);
    dots.forEach(d => {
      d.x = (d.x + d.vx + mbc.width) % mbc.width;
      d.y = (d.y + d.vy + mbc.height) % mbc.height;
      ctx2.fillStyle = d.acid ? 'rgba(197,251,58,0.55)' : 'rgba(200,198,190,0.3)';
      ctx2.beginPath();
      ctx2.arc(d.x, d.y, d.r, 0, Math.PI * 2);
      ctx2.fill();
    });
    requestAnimationFrame(drawMobileBg);
  })();

  // ---- scroll-driven panel entrance + skill bar animations ----
  const panelObserver = new IntersectionObserver((entries) => {
    entries.forEach(entry => {
      if (!entry.isIntersecting) return;
      const panel = entry.target;
      panel.classList.add('in-view');
      panel.querySelectorAll('.cell').forEach((c, i) => {
        setTimeout(() => c.classList.add('bar-anim'), 120 + i * 70);
      });
      panelObserver.unobserve(panel);
    });
  }, { threshold: 0.12 });
  document.querySelectorAll('#mobile-view .panel').forEach(p => panelObserver.observe(p));

  // active nav highlight on scroll
  const sections = WAYPOINTS.map(wp => document.getElementById('section-' + wp.id));
  const navBtns = [...navEl.children];
  const scrollObserver = new IntersectionObserver((entries) => {
    entries.forEach(entry => {
      if (!entry.isIntersecting) return;
      const idx = sections.indexOf(entry.target);
      if (idx >= 0) navBtns.forEach((b, j) => b.classList.toggle('active', j === idx));
    });
  }, { threshold: 0.4 });
  sections.forEach(s => s && scrollObserver.observe(s));
}

// ----- nav bar -----
let goTo = () => {}; // assigned in !isMobile block below
const navEl = document.getElementById('nav');
WAYPOINTS.forEach((wp, i) => {
  const b = document.createElement('button');
  b.dataset.idx = i;
  b.innerHTML = `<span class="idx">${String(i).padStart(2, '0')}</span><span>${wp.label}</span>`;
  b.addEventListener('click', () => {
    if (isMobile) {
      const sec = document.getElementById('section-' + wp.id);
      if (sec) {
        const offset = navEl.offsetHeight + 8;
        const top = sec.getBoundingClientRect().top + window.scrollY - offset;
        window.scrollTo({ top, behavior: 'smooth' });
      }
      [...navEl.children].forEach((btn, j) => btn.classList.toggle('active', j === i));
    } else {
      goTo(i);
    }
  });
  navEl.appendChild(b);
});
function setActive(i) {
  [...navEl.children].forEach((b, j) => b.classList.toggle('active', j === i));
  const tNode = document.getElementById('t-node');
  if (tNode) tNode.textContent = WAYPOINTS[i].label;
}

if (!isMobile) {
// ----- camera control -----
let currentIdx = 0;
let camFrom = new THREE.Vector3().fromArray(WAYPOINTS[0].cam);
let camTo = new THREE.Vector3().fromArray(WAYPOINTS[0].cam);
let tgtFrom = new THREE.Vector3().fromArray(WAYPOINTS[0].target);
let tgtTo = new THREE.Vector3().fromArray(WAYPOINTS[0].target);
let tweenStart = 0;
let tweenDur = 1400;
let isTweening = false;
camera.position.copy(camTo);

// orbit offset from drag (gentle, returns to zero)
let orbitYaw = 0, orbitPitch = 0;
let orbitTargetYaw = 0, orbitTargetPitch = 0;
let dragging = false; let lastX = 0, lastY = 0;
window.addEventListener('mousedown', e => {
  if (e.target.closest('input, button, a, #chat, #nav, .panel')) return;
  dragging = true; lastX = e.clientX; lastY = e.clientY;
});
window.addEventListener('mouseup', () => { dragging = false; });
window.addEventListener('mousemove', e => {
  if (!dragging) return;
  const dx = e.clientX - lastX;
  const dy = e.clientY - lastY;
  lastX = e.clientX; lastY = e.clientY;
  orbitTargetYaw   = Math.max(-0.35, Math.min(0.35, orbitTargetYaw   + dx * 0.0025));
  orbitTargetPitch = Math.max(-0.18, Math.min(0.18, orbitTargetPitch - dy * 0.0015));
});

goTo = function(i) {
  if (i < 0 || i >= WAYPOINTS.length) return;
  currentIdx = i;
  setActive(i);
  camFrom.copy(camera.position);
  tgtFrom.copy(getLookTarget());
  camTo.fromArray(WAYPOINTS[i].cam);
  tgtTo.fromArray(WAYPOINTS[i].target);
  tweenStart = performance.now();
  isTweening = true;
  orbitTargetYaw = 0; orbitTargetPitch = 0;
};
let _lookAt = new THREE.Vector3();
function getLookTarget() {
  // approximate current look-at point ~600 ahead
  _lookAt.copy(camera.position);
  const d = new THREE.Vector3();
  camera.getWorldDirection(d);
  _lookAt.addScaledVector(d, 600);
  return _lookAt;
}

// scroll wheel — snap one node, lock until tween settles
let scrollLocked = false;
window.addEventListener('wheel', e => {
  if (e.target.closest('#chat, #chat-input')) return;
  e.preventDefault();
  if (scrollLocked) return;
  if (e.deltaY > 0) goTo(Math.min(currentIdx + 1, WAYPOINTS.length - 1));
  else if (e.deltaY < 0) goTo(Math.max(currentIdx - 1, 0));
  scrollLocked = true;
  setTimeout(() => { scrollLocked = false; }, tweenDur + 100);
}, { passive: false });

window.addEventListener('keydown', e => {
  if (e.target.matches('input, textarea')) return;
  if (e.key === 'ArrowRight' || e.key === 'ArrowDown') goTo(Math.min(currentIdx + 1, WAYPOINTS.length - 1));
  else if (e.key === 'ArrowLeft' || e.key === 'ArrowUp') goTo(Math.max(currentIdx - 1, 0));
  else if (/^[0-9]$/.test(e.key)) {
    const n = parseInt(e.key, 10);
    if (n < WAYPOINTS.length) goTo(n);
  }
});

// ----- compass canvas -----
const cmp = document.getElementById('compass');
const cctx = cmp.getContext('2d');
function drawCompass() {
  const w = cmp.width, h = cmp.height;
  cctx.clearRect(0, 0, w, h);
  cctx.strokeStyle = '#2a2826';
  cctx.lineWidth = 2;
  cctx.strokeRect(2, 2, w-4, h-4);
  // center
  const cx = w/2, cy = h/2;
  // axis lines
  cctx.strokeStyle = '#3a3835';
  cctx.beginPath();
  cctx.moveTo(2, cy); cctx.lineTo(w-2, cy);
  cctx.moveTo(cx, 2); cctx.lineTo(cx, h-2);
  cctx.stroke();
  // current node position (normalized)
  const z = camera.position.z;
  const x = camera.position.x;
  const nx = cx + (x / 1400) * (w/2 - 8);
  const ny = cy + (z / 6000) * (h/2 - 8) + (h/4);
  // path dots
  WAYPOINTS.forEach((wp, i) => {
    const px = cx + (wp.cam[0] / 1400) * (w/2 - 8);
    const py = cy + (wp.cam[2] / 6000) * (h/2 - 8) + (h/4);
    cctx.fillStyle = i === currentIdx ? '#c5fb3a' : '#5a5852';
    cctx.fillRect(px - 2, py - 2, 4, 4);
  });
  // current
  cctx.fillStyle = '#c5fb3a';
  cctx.fillRect(nx - 3, ny - 3, 6, 6);
  cctx.strokeStyle = '#c5fb3a';
  cctx.strokeRect(nx - 6, ny - 6, 12, 12);
  // labels
  cctx.fillStyle = '#6a6862';
  cctx.font = '9px JetBrains Mono';
  cctx.fillText('MAP', 6, 14);
  cctx.fillText('N.' + String(currentIdx).padStart(2,'0'), w - 38, 14);
}

// ----- boot sequence -----
const bootLines = [
  '> mounting NODE.NEXUS-PRIMARY-01',
  '> three.js renderer ........ <span class="ok">OK</span>',
  '> css3d overlay ............ <span class="ok">OK</span>',
  '> vector index 1536-d ...... <span class="ok">OK</span>',
  '> retrieval pipeline ....... <span class="ok">ONLINE</span>',
  '> uplink to nexus ........... <span class="ok">ESTABLISHED</span>',
  '> handing off control to operator',
];
const bootEl = document.getElementById('boot-lines');
let bi = 0;
const bootTick = setInterval(() => {
  if (bi >= bootLines.length) { clearInterval(bootTick); return; }
  const div = document.createElement('div');
  div.innerHTML = bootLines[bi++];
  bootEl.appendChild(div);
}, 180);
setTimeout(() => {
  document.getElementById('boot').classList.add('gone');
  setTimeout(() => document.getElementById('boot').remove(), 700);
}, 1900);

// ----- resize -----
window.addEventListener('resize', () => {
  camera.aspect = window.innerWidth / window.innerHeight;
  camera.updateProjectionMatrix();
  renderer.setSize(window.innerWidth, window.innerHeight);
  cssRenderer.setSize(window.innerWidth, window.innerHeight);
});

// ----- telemetry -----
const tcx = document.getElementById('t-cx');
const tcy = document.getElementById('t-cy');
const tcz = document.getElementById('t-cz');
const tfps = document.getElementById('t-fps');
const tclk = document.getElementById('t-clock');
let fpsAcc = 0, fpsCount = 0, fpsLast = performance.now();

// ----- render loop -----
function easeInOutCubic(t) { return t < 0.5 ? 4*t*t*t : 1 - Math.pow(-2*t+2, 3)/2; }
const lookCur = new THREE.Vector3();
const upVec = new THREE.Vector3(0, 1, 0);

function tick(now) {
  // tween camera
  if (isTweening) {
    const t = Math.min(1, (now - tweenStart) / tweenDur);
    const e = easeInOutCubic(t);
    camera.position.lerpVectors(camFrom, camTo, e);
    lookCur.lerpVectors(tgtFrom, tgtTo, e);
    if (t >= 1) isTweening = false;
  } else {
    lookCur.fromArray(WAYPOINTS[currentIdx].target);
  }

  // ease orbit
  orbitYaw   += (orbitTargetYaw   - orbitYaw)   * 0.08;
  orbitPitch += (orbitTargetPitch - orbitPitch) * 0.08;
  if (!dragging) {
    orbitTargetYaw   *= 0.96;
    orbitTargetPitch *= 0.96;
  }

  // apply orbit as look offset
  const tmp = new THREE.Vector3().copy(lookCur).sub(camera.position);
  tmp.applyAxisAngle(upVec, orbitYaw);
  const right = new THREE.Vector3().crossVectors(tmp, upVec).normalize();
  tmp.applyAxisAngle(right, orbitPitch);
  const finalLook = new THREE.Vector3().copy(camera.position).add(tmp);
  camera.lookAt(finalLook);

  // animate props
  props.forEach(p => {
    p.mesh.rotation.x += p.spin[0];
    p.mesh.rotation.y += p.spin[1];
    p.mesh.rotation.z += p.spin[2];
  });

  // drift particles
  points.rotation.y += 0.0001;
  glow.rotation.y -= 0.00015;

  // render
  renderer.render(scene, camera);
  cssRenderer.render(scene, camera);

  // telemetry
  tcx.textContent = Math.round(camera.position.x).toString().padStart(5, '0');
  tcy.textContent = Math.round(camera.position.y).toString().padStart(5, '0');
  tcz.textContent = Math.round(camera.position.z).toString().padStart(6, '0');

  fpsAcc += (now - fpsLast); fpsCount++;
  fpsLast = now;
  if (fpsCount >= 30) {
    tfps.textContent = Math.round(1000 / (fpsAcc / fpsCount));
    fpsAcc = 0; fpsCount = 0;
  }

  drawCompass();
  requestAnimationFrame(tick);
}
requestAnimationFrame(tick);

// clock
setInterval(() => {
  const d = new Date();
  tclk.textContent = d.toISOString().slice(11, 19);
}, 1000);

// touch swipe for 3D navigation
let touchStartX = 0, touchStartY = 0;
window.addEventListener('touchstart', e => {
  touchStartX = e.touches[0].clientX;
  touchStartY = e.touches[0].clientY;
}, { passive: true });
window.addEventListener('touchend', e => {
  const dx = e.changedTouches[0].clientX - touchStartX;
  const dy = e.changedTouches[0].clientY - touchStartY;
  if (Math.abs(dy) > Math.abs(dx) && Math.abs(dy) > 50) {
    if (dy < 0) goTo(Math.min(currentIdx + 1, WAYPOINTS.length - 1));
    else goTo(Math.max(currentIdx - 1, 0));
  }
}, { passive: true });

} // end !isMobile

setActive(0);
</script>
